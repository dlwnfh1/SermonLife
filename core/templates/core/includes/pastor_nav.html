<section class="panel pastor-nav-panel">
    <nav class="pastor-nav" aria-label="교역자 메뉴">
        <a
            class="pastor-nav-link {% if pastor_menu == 'sermon' %}pastor-nav-link-active{% endif %}"
            href="{% if sermon %}{% url 'core:pastor_sermon_edit' sermon.pk %}{% else %}{% url 'core:pastor_dashboard' %}{% endif %}"
        >
            설교 검토
        </a>
        <a
            class="pastor-nav-link {% if pastor_menu == 'reports' %}pastor-nav-link-active{% endif %}"
            href="{% url 'core:pastor_reports' %}"
        >
            리포트
        </a>
        <a
            class="pastor-nav-link {% if pastor_menu == 'members' %}pastor-nav-link-active{% endif %}"
            href="{% url 'core:pastor_members' %}"
        >
            교인 참여 현황
        </a>
        <a
            class="pastor-nav-link {% if pastor_menu == 'transcript_rules' %}pastor-nav-link-active{% endif %}"
            href="{% url 'core:pastor_transcript_corrections' %}"
        >
            AI 단어 학습 시키기
        </a>
        {% if can_use_audio_transcriber %}
            <a
                class="pastor-nav-link {% if pastor_menu == 'audio_transcriber' %}pastor-nav-link-active{% endif %}"
                href="{% url 'core:pastor_audio_transcriber' %}"
            >
                Transcript 만들기
            </a>
        {% endif %}
    </nav>
</section>
