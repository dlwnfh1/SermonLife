{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | Word &amp; Life</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
    <link rel="manifest" href="{% static 'core/manifest.json' %}">
    <link rel="apple-touch-icon" href="{% static 'core/icons/apple-touch-icon.png' %}">
    <meta name="theme-color" content="#2f6b84">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <main class="page-shell auth-shell">
        <section class="auth-card">
            <p class="eyebrow">WORD &amp; LIFE</p>
            <h1>로그인</h1>

            {% if messages %}
                <div class="auth-messages">
                    {% for message in messages %}
                        <p class="message-row {{ message.tags }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post" class="auth-form">
                {% csrf_token %}
                {{ form.non_field_errors }}
                {% for field in form %}
                    <label class="auth-label">
                        <span>{{ field.label }}</span>
                        {{ field }}
                        {% if field.errors %}
                            <small class="field-error">{{ field.errors|striptags }}</small>
                        {% endif %}
                    </label>
                {% endfor %}
                <button type="submit" class="action-button wide-button">로그인</button>
            </form>

            <p class="auth-helper">아직 계정이 없으시면 <a href="{% url 'core:signup' %}">Create user</a></p>
        </section>
    </main>
</body>
</html>
