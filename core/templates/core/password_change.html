{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 | SermonLife</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <main class="page-shell auth-shell">
        <section class="auth-card">
            <p class="eyebrow">SERMONLIFE</p>
            <h1>비밀번호 변경</h1>

            {% if messages %}
                <div class="auth-messages">
                    {% for message in messages %}
                        <p class="message-row {{ message.tags }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post" class="auth-form">
                {% csrf_token %}
                {{ form.non_field_errors }}
                {% for field in form %}
                    <label class="auth-label">
                        <span>{{ field.label }}</span>
                        {{ field }}
                        {% if field.errors %}
                            <small class="field-error">{{ field.errors|striptags }}</small>
                        {% endif %}
                    </label>
                {% endfor %}
                <button type="submit" class="action-button wide-button">비밀번호 저장</button>
            </form>

            <p class="auth-helper"><a href="{% url 'core:home' %}">홈으로 돌아가기</a></p>
        </section>
    </main>
</body>
</html>
