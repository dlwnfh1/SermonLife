{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 | Word &amp; Life</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
    <link rel="manifest" href="{% static 'core/manifest.json' %}">
    <link rel="apple-touch-icon" href="{% static 'core/icons/apple-touch-icon.png' %}">
    <meta name="theme-color" content="#2f6b84">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <main class="page-shell auth-shell">
        <section class="auth-card">
            <p class="eyebrow">WORD &amp; LIFE</p>
            <h1>비밀번호 변경</h1>

            {% if messages %}
                <div class="auth-messages">
                    {% for message in messages %}
                        <p class="message-row {{ message.tags }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post" class="auth-form">
                {% csrf_token %}
                {{ form.non_field_errors }}
                {% for field in form %}
                    <label class="auth-label">
                        <span>{{ field.label }}</span>
                        {% if field.field.widget.input_type == "password" %}
                            <div class="password-visibility-wrap">
                                {{ field }}
                                <button type="button" class="password-visibility-button" data-password-toggle aria-label="비밀번호 보기" aria-pressed="false">
                                    <span class="sr-only">비밀번호 보기</span>
                                    <svg class="password-visibility-icon password-visibility-icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M2.2 12s3.6-6 9.8-6 9.8 6 9.8 6-3.6 6-9.8 6-9.8-6-9.8-6Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                        <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
                                    </svg>
                                    <svg class="password-visibility-icon password-visibility-icon-off" viewBox="0 0 24 24" aria-hidden="true">
                                        <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                        <path d="M10.6 5.3A11 11 0 0 1 12 5.2c6.2 0 9.8 6 9.8 6a17.7 17.7 0 0 1-3.5 4.2M6.2 6.3A18.3 18.3 0 0 0 2.2 12s3.6 6 9.8 6c1.7 0 3.2-.4 4.5-1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M9.9 9.9A3.2 3.2 0 0 0 14.1 14.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                                    </svg>
                                </button>
                            </div>
                        {% else %}
                            {{ field }}
                        {% endif %}
                        {% if field.errors %}
                            <small class="field-error">{{ field.errors|striptags }}</small>
                        {% endif %}
                    </label>
                {% endfor %}
                <button type="submit" class="action-button wide-button">비밀번호 저장</button>
            </form>

            <p class="auth-helper"><a href="{% url 'core:home' %}">홈으로 돌아가기</a></p>
        </section>
    </main>
    <script>
        (function () {
            Array.prototype.slice.call(document.querySelectorAll("[data-password-toggle]")).forEach(function (button) {
                button.addEventListener("click", function () {
                    var wrap = button.closest(".password-visibility-wrap");
                    var input = wrap ? wrap.querySelector("input") : null;
                    if (!input) {
                        return;
                    }
                    var showing = input.type === "text";
                    input.type = showing ? "password" : "text";
                    button.setAttribute("aria-label", showing ? "비밀번호 보기" : "비밀번호 숨기기");
                    button.setAttribute("aria-pressed", showing ? "false" : "true");
                    var srOnly = button.querySelector(".sr-only");
                    if (srOnly) {
                        srOnly.textContent = showing ? "비밀번호 보기" : "비밀번호 숨기기";
                    }
                });
            });
        })();
    </script>
</body>
</html>
